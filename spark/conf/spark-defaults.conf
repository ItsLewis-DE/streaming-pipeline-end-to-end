# =============================================================================
# Spark Defaults - Production Tuning
# =============================================================================

# ---- Serialization ----
spark.serializer                          org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max           256m

# ---- Shuffle ----
spark.sql.shuffle.partitions              8
spark.sql.adaptive.enabled                true
spark.sql.adaptive.coalescePartitions.enabled true

# ---- Streaming ----
spark.streaming.backpressure.enabled      true
spark.streaming.kafka.maxRatePerPartition 1000
spark.sql.streaming.checkpointLocation    /opt/spark/checkpoints
spark.sql.streaming.schemaInference       true

# ---- Memory ----
spark.driver.memory                       1g
spark.executor.memory                     1g
spark.memory.fraction                     0.8
spark.memory.storageFraction              0.3

# ---- Extra JARs (Kafka connector) ----
spark.jars                                /opt/spark/jars/extras/spark-sql-kafka-0-10_2.12-3.5.6.jar,/opt/spark/jars/extras/kafka-clients-3.5.2.jar,/opt/spark/jars/extras/spark-token-provider-kafka-0-10_2.12-3.5.6.jar,/opt/spark/jars/extras/commons-pool2-2.12.0.jar,/opt/spark/jars/extras/postgresql-42.7.4.jar,/opt/spark/jars/extras/iceberg-spark-runtime-3.5_2.12-1.6.1.jar,/opt/spark/jars/extras/hadoop-aws-3.3.4.jar,/opt/spark/jars/extras/aws-java-sdk-bundle-1.12.262.jar

# ---- UI ----
spark.ui.port                             4040
spark.ui.reverseProxy                     true

# ---- Logging ----
spark.eventLog.enabled                    true
spark.eventLog.dir                        /opt/spark/spark-events

# ---- Prometheus Metrics ----
spark.metrics.conf.*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.*.sink.prometheusServlet.path=/metrics/prometheus
spark.metrics.conf.master.sink.prometheusServlet.path=/metrics/master/prometheus
spark.metrics.conf.worker.sink.prometheusServlet.path=/metrics/worker/prometheus
spark.metrics.conf.applications.sink.prometheusServlet.path=/metrics/applications/prometheus

# ---- Iceberg Catalog (Hive Metastore) ----
spark.sql.extensions                      org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type          hive
spark.sql.catalog.lakehouse.uri           thrift://hive-metastore:9083
spark.sql.catalog.lakehouse.warehouse     s3a://sandbox/
spark.sql.catalog.lakehouse.s3.endpoint   http://minio:9000
spark.sql.catalog.lakehouse.s3.path-style-access  true
spark.sql.defaultCatalog                  lakehouse

# ---- S3 / MinIO ----
spark.hadoop.fs.s3a.endpoint              http://minio:9000
spark.hadoop.fs.s3a.access.key            minioadmin
spark.hadoop.fs.s3a.secret.key            minioadmin123
spark.hadoop.fs.s3a.path.style.access     true
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
