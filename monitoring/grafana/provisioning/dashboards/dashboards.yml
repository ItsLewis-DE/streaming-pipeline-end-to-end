apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file #Grafana sẽ đọc nội dung dashboard từ các file văn bản 
    disableDeletion: true #Có cho phép xóa dashboard trên UI kh
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
