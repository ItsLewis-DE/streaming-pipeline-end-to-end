# =============================================================================
# Prometheus Configuration
# Scrape targets for the data pipeline stack
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ---- Prometheus self-monitoring ----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ---- Kafka Exporter ----
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          cluster: "pipeline-kafka"

  # ---- Spark Master ----
  - job_name: "spark-master"
    metrics_path: "/metrics/master/prometheus"
    static_configs:
      - targets: ["spark-master:8080"]
        labels:
          component: "master"

  # ---- Spark Worker ----
  - job_name: "spark-worker"
    metrics_path: "/metrics/worker/prometheus"
    static_configs:
      - targets: ["spark-worker-1:8081"]
        labels:
          component: "worker"

  # ---- MinIO ----
  - job_name: "minio"
    metrics_path: "/minio/v2/metrics/cluster"
    static_configs:
      - targets: ["minio:9000"]
        labels:
          component: "data-lake"

  # ---- Spark Streaming Custom Metrics ----
  - job_name: "spark-streaming-app"
    static_configs:
      # Cố gắng cào dữ liệu từ port 9108 trên cả master và worker 
      # (tùy thuộc vào việc Spark Driver của bạn đang chạy ở đâu)
      - targets: ["spark-master:9108", "spark-worker-1:9108"]
        labels:
          app: "music-streaming-metrics"
