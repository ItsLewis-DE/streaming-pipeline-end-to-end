networks:
  kafka-network:
    driver: bridge
    name: kafka-network

volumes:
  kafka-1-data:
  postgres-data:
  redis-data:
  airflow-logs:
  airflow-plugins:
  spark-events:
  spark-checkpoints:
  prometheus-data:
  grafana-data:
  minio-data:
  postgres-gold-data:

# =============================================================================
# Common Airflow configuration (YAML anchor)
# =============================================================================
x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW__CORE__AUTH_MANAGER}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    # Note: AIRFLOW__API__AUTH_BACKENDS removed in Airflow 3 (auth managed by Auth Manager)
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: ${AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
    AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW__SMTP__SMTP_HOST}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW__SMTP__SMTP_STARTTLS:-True}
    AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW__SMTP__SMTP_SSL:-False}
    AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW__SMTP__SMTP_USER}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW__SMTP__SMTP_PASSWORD}
    AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW__SMTP__SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW__SMTP__SMTP_MAIL_FROM}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - kafka-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ===========================================================================
  # KAFKA (KRaft Mode - Single Broker for Local Development)
  # ===========================================================================
  kafka-1:
    image: apache/kafka:${KAFKA_VERSION:-3.7.0}
    container_name: kafka-1
    hostname: kafka-1
    ports:
      - "29092:29092"   # External access
      - "9092:9092"     # Internal broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true" 
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx1g -Xms512m}
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
    restart: unless-stopped

  # ===========================================================================
  # POSTGRESQL (Airflow Metadata Database)
  # ===========================================================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: postgres
    hostname: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # POSTGRESQL GOLD (Serving Gold Data)
  # ===========================================================================
  postgres-gold:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: postgres-gold
    hostname: postgres-gold
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: gold_db
      POSTGRES_USER: gold_user
      POSTGRES_PASSWORD: gold_password
    volumes:
      - postgres-gold-data:/var/lib/postgresql/data
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # REDIS (Celery Broker for Airflow)
  # ===========================================================================
  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis
    hostname: redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  # ===========================================================================
  # SPARK MASTER
  # ===========================================================================
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8181:8080"
      - "7077:7077"
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    command: >
      bash -c "/opt/spark/sbin/start-master.sh &&
               /usr/sbin/sshd &&
               mkdir -p /opt/spark/spark-events /opt/spark/checkpoints &&
               chmod 777 /opt/spark/spark-events /opt/spark/checkpoints &&
               sleep 15 &&
               /opt/spark/bin/spark-submit --master spark://spark-master:7077 --conf spark.driver.memory=512m --conf spark.executor.memory=512m --conf spark.cores.max=1 --conf spark.executor.cores=1 /opt/spark/app/bronze/kafka_to_bronze.py &
               /opt/spark/bin/spark-submit --master spark://spark-master:7077 --conf spark.driver.memory=512m --conf spark.executor.memory=512m --conf spark.cores.max=1 --conf spark.executor.cores=1 /opt/spark/app/metrics/stream_metrics.py &
               /opt/spark/bin/spark-submit --master spark://spark-master:7077 --conf spark.driver.memory=512m --conf spark.executor.memory=512m --conf spark.cores.max=1 --conf spark.executor.cores=1 /opt/spark/app/init/init_namespace.py &
               mkdir -p /opt/spark/logs && touch /opt/spark/logs/init.log && tail -f /opt/spark/logs/*"
    volumes:
      - ./spark/app:/opt/spark/app:ro
      - spark-events:/opt/spark/spark-events
      - spark-checkpoints:/opt/spark/checkpoints
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/json/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # SPARK WORKER
  # ===========================================================================
  spark-worker-1:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker-1
    hostname: spark-worker-1
    ports:
      - "8182:8081"
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_WEBUI_PORT: 8081
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
               mkdir -p /opt/spark/spark-events /opt/spark/checkpoints &&
               chmod 777 /opt/spark/spark-events /opt/spark/checkpoints &&
               mkdir -p /opt/spark/logs && touch /opt/spark/logs/init.log && tail -f /opt/spark/logs/*"
    volumes:
      - ./spark/app:/opt/spark/app:ro
      - spark-events:/opt/spark/spark-events
      - spark-checkpoints:/opt/spark/checkpoints
    networks:
      - kafka-network
    depends_on:
      spark-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 5120M
          cpus: "2.0"
    restart: unless-stopped

  # ===========================================================================
  # AIRFLOW WEBSERVER
  # ===========================================================================
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # AIRFLOW SCHEDULER
  # ===========================================================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8793/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # AIRFLOW DAG PROCESSOR (Required in Airflow 3)
  # ===========================================================================
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    hostname: airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # AIRFLOW CELERY WORKER
  # ===========================================================================
  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    hostname: airflow-worker
    command: airflow celery worker
    healthcheck:
      test: ["CMD-SHELL", "airflow celery inspect ping -d celery@airflow-worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.5"
    restart: unless-stopped

  # ===========================================================================
  # AIRFLOW INIT
  # ===========================================================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Initializing Airflow database..."
        airflow db migrate
        echo "Creating admin user..."
        airflow users create \
          --username $${AIRFLOW_ADMIN_USER} \
          --password $${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email $${AIRFLOW_ADMIN_EMAIL} || true
        echo "Creating Airflow connections..."

        airflow connections add 'spark_default' \
          --conn-type 'spark' \
          --conn-host 'spark://spark-master' \
          --conn-port '7077' || true
        echo "Airflow initialization complete."
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
      AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW__CORE__AUTH_MANAGER}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    restart: "no"

  # ===========================================================================
  # FLOWER (Celery Monitoring)
  # ===========================================================================
  flower:
    <<: *airflow-common
    container_name: flower
    hostname: flower
    command: airflow celery flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  # ===========================================================================
  # KAFKA UI
  # ===========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:${KAFKA_UI_VERSION:-v0.7.2}
    container_name: kafka-ui
    hostname: kafka-ui
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pipeline-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - kafka-network
    depends_on:
      kafka-1:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  # ===========================================================================
  # PROMETHEUS
  # ===========================================================================
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.54.1}
    container_name: prometheus
    hostname: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  # ===========================================================================
  # GRAFANA
  # ===========================================================================
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    container_name: grafana
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - kafka-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  # ===========================================================================
  # KAFKA EXPORTER
  # ===========================================================================
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    hostname: kafka-exporter
    command:
      - "--kafka.server=kafka-1:9092"
      - "--topic.filter=.*"
      - "--group.filter=.*"
    networks:
      - kafka-network
    depends_on:
      kafka-1:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

  # ===========================================================================
  # EVENTSIM
  # ===========================================================================
  eventsim:
    build:
      context: ./eventsim
      dockerfile: Dockerfile
    container_name: eventsim
    command: >
      -c "examples/example-config.json"
      --start-time "2024-01-01T00:00:00"
      --end-time "2024-01-01T23:59:00"
      --nusers 10000
      --kafkaBrokerList kafka-1:9092
      --continuous
    networks:
      - kafka-network
    depends_on:
      kafka-1:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "0.5"
    restart: unless-stopped

  # ===========================================================================
  # MINIO
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # MINIO INIT
  # ===========================================================================
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-admin123};
      /usr/bin/mc mb myminio/bronze --ignore-existing;
      /usr/bin/mc mb myminio/sandbox --ignore-existing;
      /usr/bin/mc mb myminio/silver --ignore-existing;
      /usr/bin/mc mb myminio/gold --ignore-existing;
      /usr/bin/mc mb myminio/metadata --ignore-existing;
      "
    networks:
      - kafka-network
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # ===========================================================================
  # HIVE METASTORE
  # ===========================================================================
  hive-metastore:
    build:
      context: ./hive
      dockerfile: Dockerfile
    container_name: hive-metastore
    hostname: hive-metastore
    ports:
      - "9083:9083"     # Hive Metastore Thrift API
    environment:
      SERVICE_NAME: metastore
      SERVICE_OPTS: "-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=hive -Dfs.s3a.endpoint=http://minio:9000 -Dfs.s3a.access.key=minioadmin -Dfs.s3a.secret.key=minioadmin123 -Dfs.s3a.path.style.access=true -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem"
    networks:
      - kafka-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  # ===========================================================================
  # SUPERSET INIT
  # ===========================================================================
  superset-init:
    image: apache/superset:latest
    container_name: superset-init
    command: >
      bash -c "pip install psycopg2-binary redis &&
               superset db upgrade &&
               superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin &&
               superset init"
    environment:
      PYTHONPATH: '/app/pythonpath:/app/superset_home/.local/lib/python3.10/site-packages'
      SUPERSET_SECRET_KEY: 'your_secret_key_here'
      SQLALCHEMY_DATABASE_URI: 'postgresql://superset:superset@postgres:5432/superset_db'
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    networks:
      - kafka-network
    depends_on:
      postgres:
        condition: service_healthy

  # ===========================================================================
  # SUPERSET
  # ===========================================================================
  superset:
    image: apache/superset:latest
    container_name: superset
    hostname: superset
    command: >
      bash -c "pip install psycopg2-binary redis && /app/docker/entrypoints/run-server.sh"
    ports:
      - "8088:8088"
    environment:
      PYTHONPATH: '/app/pythonpath:/app/superset_home/.local/lib/python3.10/site-packages'
      SUPERSET_SECRET_KEY: 'your_secret_key_here'
      SQLALCHEMY_DATABASE_URI: 'postgresql://superset:superset@postgres:5432/superset_db'
      SUPERSET_CACHE_TYPE: 'RedisCache'
      SUPERSET_CACHE_DEFAULT_TIMEOUT: 86400
      SUPERSET_CACHE_REDIS_URL: 'redis://redis:6379/1'
      TALISMAN_ENABLED: 'False'
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    networks:
      - kafka-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
